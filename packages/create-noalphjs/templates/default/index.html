<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplikasi noalphjs — Framework JavaScript Indonesia" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>noalphjs app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { background: #0a0a0f; color: #e8e8f0; font-family: 'Inter', system-ui, sans-serif; }
      #loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0a0a0f; gap: 1.5rem; z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading.hidden { opacity: 0; pointer-events: none; }
      .loading-logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 2.2rem; color: white;
        animation: pulse 1.8s ease-in-out infinite;
        box-shadow: 0 0 40px rgba(99,102,241,0.5);
      }
      @keyframes pulse {
        0%,100% { transform: scale(1); box-shadow: 0 0 40px rgba(99,102,241,0.4); }
        50% { transform: scale(1.07); box-shadow: 0 0 70px rgba(139,92,246,0.7); }
      }
      .loading-bar-wrap {
        width: 200px; height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px; overflow: hidden;
      }
      .loading-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
        border-radius: 99px;
        animation: load 1.2s ease forwards;
      }
      @keyframes load { to { width: 100%; } }
      .loading-text {
        font-size: 0.8rem; letter-spacing: 0.15em;
        color: rgba(232,232,240,0.4); text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-logo">●</div>
      <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
      <div class="loading-text">noalphjs</div>
    </div>

    <div id="app"></div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      window.__noalph_ready = function() {
        const el = document.getElementById('loading')
        if (el) { el.classList.add('hidden'); setTimeout(() => el.remove(), 500) }
      }
      setTimeout(() => window.__noalph_ready && window.__noalph_ready(), 3000)
    </script>
  </body>
</html>
